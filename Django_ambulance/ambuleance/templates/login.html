{% extends 'base.html' %}

{% block title %}RapidAid — Sign In{% endblock %}
{% load static %}

{% block content %}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c0f;
    --red:     #e63946;
    --red-2:   #ff6b6b;
    --red-dk:  #b02030;
    --text:    #eef0f4;
    --muted:   #6b7280;
    --surface: rgba(255,255,255,0.04);
    --border:  rgba(255,255,255,0.08);
    --green:   #22c55e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── BG orbs ── */
  .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: drift 16s ease-in-out infinite alternate; }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #e63946, transparent 70%); top: -160px; left: -120px; }
  .orb-2 { width: 380px; height: 380px; background: radial-gradient(circle, #b02030, transparent 70%); bottom: -120px; right: -80px; animation-delay: -6s; }
  .orb-3 { width: 260px; height: 260px; background: radial-gradient(circle, #ff6b6b, transparent 70%); top: 60%; left: 55%; animation-delay: -11s; opacity: 0.07; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(35px,25px) scale(1.07); }
  }
  .bg-layer::after {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    margin: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px 36px 36px;
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92) translateY(24px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Logo ── */
  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 32px;
  }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--red), var(--red-dk));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 28px rgba(230,57,70,0.45);
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 6px 28px rgba(230,57,70,0.4); }
    50%      { box-shadow: 0 8px 40px rgba(230,57,70,0.65); }
  }
  .logo-name {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
    color: var(--text); letter-spacing: -0.01em;
  }

  /* ── Header text ── */
  .card-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.55rem; color: var(--text);
    text-align: center; margin-bottom: 6px; letter-spacing: -0.02em;
  }
  .card-sub {
    text-align: center; font-size: 0.82rem; color: var(--muted);
    margin-bottom: 28px; line-height: 1.6;
  }

  /* ── Role selector ── */
  .role-tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 24px;
  }
  .role-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 6px; cursor: pointer;
    text-align: center; transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .role-tab .ricon { font-size: 1.2rem; }
  .role-tab .rlabel { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em; transition: color 0.18s; }
  .role-tab:hover { border-color: rgba(230,57,70,0.3); }
  .role-tab:hover .rlabel { color: var(--red-2); }
  .role-tab.active {
    border-color: var(--red); background: rgba(230,57,70,0.1);
  }
  .role-tab.active .rlabel { color: var(--red-2); }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 0.73rem; color: var(--muted);
    letter-spacing: 0.05em; margin-bottom: 7px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px; padding: 12px 15px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  input::placeholder { color: var(--muted); opacity: 0.6; }
  input:focus { border-color: rgba(230,57,70,0.5); background: rgba(230,57,70,0.05); }

  /* Password wrapper */
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 1rem; padding: 4px; transition: color 0.18s;
  }
  .pw-toggle:hover { color: var(--red-2); }

  /* ── Forgot ── */
  .forgot-row {
    display: flex; justify-content: flex-end; margin-top: -8px; margin-bottom: 22px;
  }
  .forgot-row a {
    font-size: 0.75rem; color: var(--muted); text-decoration: none;
    transition: color 0.18s;
  }
  .forgot-row a:hover { color: var(--red-2); }

  /* ── Submit btn ── */
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--red), var(--red-dk));
    color: #fff; border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 0.98rem; font-weight: 700;
    letter-spacing: 0.03em; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 6px 28px rgba(230,57,70,0.38);
    position: relative; overflow: hidden; margin-bottom: 18px;
  }
  .btn-login::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.13), transparent 55%);
  }
  .btn-login:hover { transform: translateY(-2px) scale(1.015); box-shadow: 0 10px 38px rgba(230,57,70,0.58); }
  .btn-login:active { transform: scale(0.97); }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
  .divider span { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; }

  /* ── Register link ── */
  .register-row {
    text-align: center; font-size: 0.78rem; color: var(--muted);
  }
  .register-row a {
    color: var(--red-2); text-decoration: none; font-weight: 500;
    transition: opacity 0.18s;
  }
  .register-row a:hover { opacity: 0.75; }

  /* ── Live badge ── */
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
    border-radius: 100px; padding: 4px 12px;
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #4ade80; margin: 0 auto 22px;
    display: flex; justify-content: center; width: fit-content; margin: 0 auto 20px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pdot 1.5s infinite;
  }
  @keyframes pdot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ── Back link ── */
  .back-link {
    position: fixed; top: 20px; left: 24px; z-index: 10;
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 0.78rem;
    transition: color 0.18s;
  }
  .back-link:hover { color: var(--text); }

  @media (max-width: 480px) {
    .card { padding: 32px 22px 28px; margin: 12px; }
    .card-title { font-size: 1.3rem; }
  }
</style>


<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<a href="{% url 'index' %}" class="back-link">← Back to Home</a>

  <!-- Logo -->
  <div class="logo-row">

  </div>

  <!-- Live status -->
  <div class="live-badge">

    Emergency System Online
  </div>

  <div class="card-title">Welcome Back</div>
  <p class="card-sub">Sign in to book or manage ambulance dispatches</p>

  <!-- Role selector -->


 <form method="POST">

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone_number" placeholder="+91 0123456789">
    </div>

</div>

<script>
  function setRole(tab) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  }
  function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
