{% extends 'base.html' %}

{% block title %}Hospital Registration{% endblock %}

{% block content %}

<style>
body{
    background:#0f0f0f;
    font-family:Arial;
}

.container{
    width:90%;
    max-width:500px;
    margin:auto;
    padding:40px 0;
}

.card{
    background:#171717;
    padding:30px;
    border-radius:20px;
    color:white;
}

.heading{
    font-size:28px;
    margin-bottom:10px;
}

.sub{
    color:#aaa;
    margin-bottom:25px;
}

input,select,textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:#262626;
    color:white;
}

textarea{
    resize:none;
    height:100px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#e63946;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
</style>

<div class="container">

    <div class="card">

        <div class="heading">
            🏥 Hospital Registration
        </div>

        <div class="sub">
            Register your hospital for emergency ambulance service
        </div>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="hospital_name"
                   placeholder="Hospital Name"
                   required>

            <textarea
                name="hospital_address"
                placeholder="Hospital Address"
                required></textarea>

            <input type="text"
                   name="hospital_phone"
                   placeholder="Phone Number"
                   required>

            

            <button type="submit" class="btn">
                Register Hospital
            </button>

        </form>

    </div>

</div>

{% endblock %}
