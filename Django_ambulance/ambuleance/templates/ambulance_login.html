{% extends 'base.html' %}
{% block title %}Ambulance Login{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'DM Sans',sans-serif;
}

body{
    background:#050505;
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#111;
    padding:35px;
    border-radius:22px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo{
    font-size:55px;
    text-align:center;
    margin-bottom:10px;
}

.heading{
    text-align:center;
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#a1a1aa;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1f1f1f;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#777;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#ef4444;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#dc2626;
}

.error{
    background:#3f1111;
    color:#ffb4b4;
    padding:12px;
    border-radius:10px;
    margin-bottom:18px;
    text-align:center;
}
</style>

<div class="container">

    <div class="card">

        <div class="logo">
            🚑
        </div>

        <div class="heading">
            Ambulance Login
        </div>

        <div class="sub">
            Driver login with phone number
        </div>

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <input type="text"
                       name="phone"
                       placeholder="Enter Phone Number"
                       required>
            </div>

            <button type="submit" class="btn">
                Login Now
            </button>

        </form>

    </div>

</div>

{% endblock %}
