{% extends 'base.html' %}

{% block title %}Ambulance Registration{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'DM Sans',sans-serif;
}

body{
    background:#0f0f0f;
}

.container{
    width:90%;
    max-width:520px;
    margin:auto;
    padding:50px 0;
}

.card{
    background:#171717;
    padding:35px;
    border-radius:24px;
    color:white;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.heading{
    font-size:30px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    color:#a1a1aa;
    margin-bottom:28px;
    line-height:1.6;
}

.form-group{
    margin-bottom:16px;
}

input,
select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#262626;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#7a7a7a;
}

select{
    cursor:pointer;
}

select option{
    background:#1c1c1c;
    color:white;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#e63946;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn:hover{
    background:#ff4d5a;
    transform:translateY(-2px);
}

.error{
    background:#451515;
    color:#ffb3b3;
    padding:14px;
    border-radius:12px;
    margin-bottom:20px;
    text-align:center;
}

.login-link{
    color:#9ca3af;
    display:block;
    margin-top:18px;
    text-align:center;
    text-decoration:none;
    transition:0.3s;
}

.login-link:hover{
    color:white;
}

.icon{
    font-size:55px;
    margin-bottom:15px;
}

</style>

<div class="container">

    <div class="card">

        <div class="icon">
            🚑
        </div>

        <div class="heading">
            Ambulance Registration
        </div>

        <div class="sub">
            Register your ambulance using hospital verification key code
        </div>

        {% if error %}

        <div class="error">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <input type="text"
                       name="name"
                       placeholder="Driver Name"
                       required>
            </div>

            <div class="form-group">
                <input type="text"
                       name="phone"
                       placeholder="Driver Phone Number"
                       required>
            </div>

            <div class="form-group">
                <input type="text"
                       name="ambulance_number"
                       placeholder="Ambulance Number"
                       required>
            </div>

            <div class="form-group">
                <input type="text"
                       name="ambulance_key_code"
                       placeholder="Hospital Key Code"
                       required>
            </div>

            <div class="form-group">

                <select name="ambulance_service_type" required>

                    <option value="">
                        Select Service Type
                    </option>

                    <option value="Heart Attack">
                        ❤️ Heart Attack
                    </option>

                    <option value="Pregnancy">
                        🤰 Pregnancy
                    </option>

                    <option value="Accident">
                        🚨 Accident
                    </option>

                    <option value="All">
                        🆘 All
                    </option>

                </select>

            </div>

            <button type="submit" class="btn">
                Register Ambulance
            </button>

        </form>

        <a href="{% url 'ambulance_login_view' %}" class="login-link">
    Already registered? Login here
</a>

    </div>

</div>

{% endblock %}
