{% extends 'chat.html' %}

{% block content %}
<a class="btn btn-primary" href="{% url 'tweet_list' %}">&larr; home</a>

<h2 class="text-center">CHAT LIST</h2>
<ul class="list-group">
{% for user in users %}
<li class="list-group-item">
    <a href="{% url 'start_chat' user.id %}">
        {{ user.username }}
    </a>
</li>
{% endfor %}
</ul>


{% endblock %}
